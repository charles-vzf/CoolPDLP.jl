steps:
  - label: "CUDA tests - Julia {{matrix.version}}"
    matrix:
      setup:
        version:
          - "1.10"
          - "1"
    plugins:
      - JuliaCI/julia#v1:
          version: "{{matrix.version}}"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          codecov: true
    agents:
      queue: "juliagpu"
      cuda: "*"
    timeout_in_minutes: 60
    if: build.message !~ /\[skip tests\]/
    env:
      COOLPDLP_TEST_GROUP: "CUDA"